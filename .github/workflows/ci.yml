name: CI

on:
  push:
    branches: [main, release]
    tags: ["v*"]
  pull_request:
    branches: [main, release]

jobs:
  test:
    runs-on: ubuntu-24.04

    strategy:
      matrix:
        python: ["3.11", "3.12", "3.13"]

    name: Python ${{ matrix.python }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run lint
        run: uv run ruff check .

      - name: Run tests
        run: uv run pytest

      - name: Build package
        run: uv build

  tag:
    needs: test
    if: github.ref == 'refs/heads/release'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    outputs:
      tag_name: ${{ steps.bump.outputs.tag_name }}
      version: ${{ steps.bump.outputs.version }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine version bump
        id: bump
        shell: bash
        run: |
          set -euo pipefail
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          VERSION="${LATEST_TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          COMMITS=$(git log "${LATEST_TAG}..HEAD" --pretty=format:"%s" 2>/dev/null || git log --pretty=format:"%s")

          if echo "$COMMITS" | grep -qiE "^breaking[:(]|BREAKING CHANGE"; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          elif echo "$COMMITS" | grep -qiE "^feat[:(]"; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          NEW_TAG="v${NEW_VERSION}"

          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${NEW_TAG}" >> "$GITHUB_OUTPUT"

      - name: Update pyproject version
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path("pyproject.toml")
          content = path.read_text()
          version = "${{ steps.bump.outputs.version }}"
          updated = re.sub(
              r'(?m)^version = ".*"$',
              f'version = "{version}"',
              content,
              count=1,
          )
          if updated == content:
              raise SystemExit("Unable to update version in pyproject.toml")
          path.write_text(updated)
          PY

      - name: Commit version bump and push tag
        env:
          TAG_NAME: ${{ steps.bump.outputs.tag_name }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          git commit -m "chore(release): ${TAG_NAME}" || true
          git tag "${TAG_NAME}"
          git push origin HEAD:release "${TAG_NAME}"

  release:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get tag name
        id: tag
        run: echo "name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "${{ steps.tag.outputs.name }}" >/dev/null 2>&1; then
            echo "Release already exists for ${{ steps.tag.outputs.name }}"
          else
            gh release create "${{ steps.tag.outputs.name }}" --generate-notes
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    needs: [test, release]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    environment: pypi
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
